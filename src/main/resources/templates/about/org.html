<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('조직도')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">조직도</h1>
  <div class="bg-white rounded-xl shadow-sm p-6" id="org-wrap">
    <div class="flex items-center justify-center" style="min-height:300px">
      <p class="text-gray-400 text-sm">조직도 이미지를 업로드해주세요 (관리자 페이지)</p>
    </div>
  </div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const img = await Store.getOrgImage();
  if(img) document.getElementById('org-wrap').innerHTML = `<img src="${img}" alt="조직도" class="w-full h-auto rounded">`;
});
</script>
</body>
</html>
