<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('소개')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">총동아리연합회 소개</h1>
  <div class="bg-white rounded-xl shadow-sm p-8 space-y-6">
    <div id="intro-text" class="text-gray-700 leading-relaxed whitespace-pre-line"></div>
    <div class="border-t pt-6">
      <h2 class="text-lg font-bold text-gray-900 mb-3">비전</h2>
      <p id="vision-text" class="text-gray-700 leading-relaxed"></p>
    </div>
  </div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('intro-text').textContent = c.aboutIntro;
  document.getElementById('vision-text').textContent = c.aboutVision;
});
</script>
</body>
</html>
