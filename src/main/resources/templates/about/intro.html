<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('소개')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: about('intro')}"></div>
<div class="page-content">
  <div class="max-w-3xl sr-base" data-sr="fade-up">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">총동아리연합회란</h2>
    <div id="intro-text" class="text-gray-600 leading-relaxed whitespace-pre-wrap mb-6"></div>
  </div>
  <div class="max-w-3xl sr-base" data-sr="fade-up" data-sr-delay="150">
    <div class="bg-blue-50 border-l-4 rounded-r-lg p-5" style="border-color:#003087">
      <h3 class="font-semibold mb-2" style="color:#003087">총동아리연합회 비전</h3>
      <p id="vision-text" class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap"></p>
    </div>
  </div>
</div>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('intro-text').textContent = c.aboutIntro;
  document.getElementById('vision-text').textContent = c.aboutVision;
});
</script>
</body>
</html>
