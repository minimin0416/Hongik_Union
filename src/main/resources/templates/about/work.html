<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('주요업무')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: about('work')}"></div>
<div class="page-content">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 sr-base" data-sr="fade-up">주요업무</h2>
  <div id="work-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div th:each="w, iter : ${content.workItems}" class="bg-white border border-gray-200 rounded-xl p-5 hover:border-gray-400 hover:shadow-md transition-all sr-base"
         data-sr="fade-up" th:attr="data-sr-delay=${iter.index * 80}">
      <div class="flex items-start gap-3">
        <span class="w-7 h-7 rounded-full bg-gray-800 text-white text-sm font-bold flex items-center justify-center flex-shrink-0 mt-0.5" th:text="${iter.index + 1}"></span>
        <div>
          <h3 class="font-semibold text-gray-800 mb-1" th:text="${w.title}"></h3>
          <p class="text-gray-600 text-sm leading-relaxed" th:text="${w.desc}"></p>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
