<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('회칙')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">회칙</h1>
  <div class="bg-white rounded-xl shadow-sm p-8">
    <pre id="rules-text" class="text-gray-700 leading-relaxed whitespace-pre-wrap font-sans text-sm"></pre>
    <div id="rules-file" class="mt-4 hidden">
      <a id="rules-file-link" href="#" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span id="rules-file-name">파일 다운로드</span>
      </a>
    </div>
  </div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('rules-text').textContent = c.rules;
  if(c.rulesFile) {
    const el = document.getElementById('rules-file');
    el.classList.remove('hidden');
    document.getElementById('rules-file-link').href = c.rulesFile.url;
    document.getElementById('rules-file-link').download = c.rulesFile.name;
    document.getElementById('rules-file-name').textContent = c.rulesFile.name;
  }
});
</script>
</body>
</html>
