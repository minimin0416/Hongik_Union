<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('선거 공고')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">선거 공고</h1>
  <div class="space-y-4" id="election-list"></div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
const STATUS_COLOR = { '예정':'bg-blue-100 text-blue-700', '진행중':'bg-green-100 text-green-700', '완료':'bg-gray-100 text-gray-600' };
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const list = await Store.getElection();
  const el = document.getElementById('election-list');
  el.innerHTML = list.length ? list.map(e=>`
    <div class="bg-white rounded-xl shadow-sm p-6">
      <div class="flex items-start gap-3">
        <span class="text-xs px-2 py-1 rounded-full font-medium ${STATUS_COLOR[e.status]||'bg-gray-100 text-gray-600'} flex-shrink-0 mt-0.5">${e.status}</span>
        <div class="flex-1">
          <h3 class="font-bold text-gray-900 mb-1">${e.title}</h3>
          <p class="text-xs text-gray-400 mb-2">${e.date}</p>
          ${e.content?`<p class="text-gray-600 text-sm whitespace-pre-line">${e.content}</p>`:''}
          ${e.attachment?`<a href="${e.attachment.url}" download="${e.attachment.name}" class="inline-flex items-center gap-1 text-xs text-blue-600 hover:underline mt-2">첨부파일 다운로드</a>`:''}
        </div>
      </div>
    </div>`).join('') : '<div class="bg-white rounded-xl shadow-sm p-12 text-center text-gray-400">선거 공고가 없습니다</div>';
});
</script>
</body>
</html>
