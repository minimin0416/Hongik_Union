<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('선관위 소개')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: election('intro')}"></div>
<div class="page-content">
  <div class="max-w-3xl sr-base" data-sr="fade-up">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">동아리선거관리위원회 소개</h2>
    <p class="text-gray-600 leading-relaxed whitespace-pre-wrap mb-6" th:text="${content.electionIntro}"></p>
    <div id="values-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div th:each="v : ${content.electionValues}" class="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center">
        <h3 class="font-bold mb-2" style="color:#003087" th:text="${v.title}"></h3>
        <p class="text-gray-600 text-sm leading-relaxed" th:text="${v.desc}"></p>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
