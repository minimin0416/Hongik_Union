<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('선관위 소개')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">동아리선거관리위원회 소개</h1>
  <div class="bg-white rounded-xl shadow-sm p-8 mb-6">
    <p id="election-intro" class="text-gray-700 leading-relaxed whitespace-pre-line"></p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="values-list"></div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('election-intro').textContent = c.electionIntro;
  document.getElementById('values-list').innerHTML = c.electionValues.map(v=>`
    <div class="bg-white rounded-xl shadow-sm p-6 text-center">
      <h3 class="font-bold text-gray-900 mb-2">${v.title}</h3>
      <p class="text-gray-600 text-sm">${v.desc}</p>
    </div>`).join('');
});
</script>
</body>
</html>
