<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('일정')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/loader :: loader}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: news('calendar')}"></div>
<div class="page-content">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-2xl font-bold text-gray-800">일정</h2>
    <div class="flex items-center gap-2">
      <button id="cal-prev" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-300 hover:bg-gray-100 text-gray-600 text-lg">‹</button>
      <span id="cal-label" class="text-base font-semibold text-gray-700" style="min-width:7rem;text-align:center"></span>
      <button id="cal-next" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-300 hover:bg-gray-100 text-gray-600 text-lg">›</button>
      <button id="cal-today" class="ml-1 px-3 py-1.5 border border-gray-300 rounded-lg text-xs text-gray-600 hover:bg-gray-50">오늘</button>
    </div>
  </div>
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden" id="calendar-wrap"></div>
</div>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
const DAY_NAMES = ['일','월','화','수','목','금','토'];
function toDateStr(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
let calEvents = [], calYear, calMonth;

function renderCalendar() {
  const today = new Date();
  const todayStr = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let i=1;i<=daysInMonth;i++) cells.push(i);
  while(cells.length%7!==0) cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

  document.getElementById('cal-label').textContent = `${calYear}년 ${calMonth+1}월`;

  document.getElementById('calendar-wrap').innerHTML = `
    <div class="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
      ${DAY_NAMES.map((d,i)=>`<div class="py-2.5 text-center text-xs font-bold ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-500'}">${d}</div>`).join('')}
    </div>
    ${weeks.map(week=>`
      <div class="grid grid-cols-7 border-b border-gray-100 last:border-0">
        ${week.map((day,di)=>{
          if(!day) return `<div class="border-r border-gray-100 last:border-0 bg-gray-50/30" style="min-height:6rem"></div>`;
          const ds = toDateStr(calYear,calMonth,day);
          const holiday = Store.getHoliday(ds);
          const isToday = ds===todayStr;
          const dayEvs = calEvents.filter(e=>e.startDate<=ds&&e.endDate>=ds);
          const isRed = di===0||!!holiday;
          const isSat = di===6;
          return `<div class="border-r border-gray-100 last:border-0 p-1.5" style="min-height:6rem">
            <div class="mb-1">
              <span class="inline-flex w-6 h-6 items-center justify-center rounded-full text-xs font-semibold ${isToday?'bg-gray-800 text-white':isRed?'text-red-500':isSat?'text-blue-500':'text-gray-700'}">${day}</span>
              ${holiday?`<div class="text-red-500 mt-0.5 font-medium" style="font-size:10px;line-height:1.1">${holiday}</div>`:''}
            </div>
            <div class="space-y-0.5">${dayEvs.map(ev=>{
              const isStart=ev.startDate===ds, isEnd=ev.endDate===ds, isSingle=isStart&&isEnd;
              return `<div style="background:${ev.color||'#3B82F6'};font-size:10px;line-height:1rem" class="text-white px-1 overflow-hidden ${isSingle?'rounded':isStart?'rounded-l pl-1.5':isEnd?'rounded-r':''}">
                ${isStart?`<span class="truncate block">${ev.title}</span>`:`<span class="invisible">.</span>`}
              </div>`;
            }).join('')}</div>
          </div>`;
        }).join('')}
      </div>`).join('')}
  `;
}

document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  calEvents = await Store.getCalendarEvents();
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  renderCalendar();
  document.getElementById('cal-prev').addEventListener('click', () => { const d = new Date(calYear, calMonth-1, 1); calYear=d.getFullYear(); calMonth=d.getMonth(); renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', () => { const d = new Date(calYear, calMonth+1, 1); calYear=d.getFullYear(); calMonth=d.getMonth(); renderCalendar(); });
  document.getElementById('cal-today').addEventListener('click', () => { const t = new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); renderCalendar(); });
  Store.reveal();
});
</script>
</body>
</html>
