<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('동아리 소식')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-5xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">동아리 소식</h1>
  <div id="club-news-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const news = await Store.getClubNews();
  const el = document.getElementById('club-news-list');
  el.innerHTML = news.length ? news.map(n=>`
    <div class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition-shadow">
      ${n.imageUrl?`<img src="${n.imageUrl}" alt="${n.title}" class="w-full h-40 object-cover">`:'<div class="w-full h-40 bg-gray-100 flex items-center justify-center text-gray-300 text-4xl">📰</div>'}
      <div class="p-4">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${n.club}</span>
          <span class="text-xs text-gray-400">${n.date}</span>
        </div>
        <h3 class="font-bold text-gray-900 mb-1">${n.title}</h3>
        <p class="text-gray-600 text-sm line-clamp-2">${n.content}</p>
      </div>
    </div>`).join('') : '<div class="col-span-3 text-center text-gray-400 py-12">동아리 소식이 없습니다</div>';
});
</script>
</body>
</html>
