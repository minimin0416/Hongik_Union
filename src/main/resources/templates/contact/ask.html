<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('질문 있어요')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: contact('ask')}"></div>
<div class="page-content">
  <div class="max-w-lg">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">질문 있어요</h2>
    <p class="text-gray-500 text-sm mb-8">카카오톡 플러스친구로 문의해주세요. 빠르게 답변드리겠습니다.</p>
    <a id="kakao-link" href="#" target="_blank" rel="noopener noreferrer"
      class="flex items-center justify-center gap-3 w-full py-4 rounded-xl font-semibold text-base transition-all"
      style="background-color:#FEE500;color:#3A1D1D"
      onmouseenter="this.style.backgroundColor='#F0D800'" onmouseleave="this.style.backgroundColor='#FEE500'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#3A1D1D"><path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.9 1.87 5.45 4.68 6.96L5.5 21l3.9-2.04C10.23 19.31 11.1 19.5 12 19.5c5.52 0 10-3.69 10-8.25S17.52 3 12 3z"/></svg>
      카카오톡 플러스친구로 문의하기
    </a>
    <p class="text-xs text-gray-400 text-center mt-4">클릭 시 카카오톡 채팅으로 연결됩니다</p>
  </div>
</div>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  const link = document.getElementById('kakao-link');
  if (c.kakaoUrl) link.href = c.kakaoUrl; else link.removeAttribute('target');
});
</script>
</body>
</html>
