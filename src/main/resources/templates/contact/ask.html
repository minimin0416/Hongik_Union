<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('질문 있어요')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-2" id="ask-title">질문 있어요</h1>
  <p class="text-gray-500 mb-6 text-sm" id="ask-desc"></p>

  <div class="bg-white rounded-xl shadow-sm p-6 space-y-4" id="ask-form-wrap">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">이름 *</label>
      <input id="f-name" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" placeholder="홍길동">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">이메일 *</label>
      <input id="f-email" type="email" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" placeholder="example@hongik.ac.kr">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">연락처</label>
      <input id="f-contact" type="tel" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" placeholder="010-0000-0000">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">분류 *</label>
      <select id="f-category" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"></select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">문의 내용 *</label>
      <textarea id="f-message" rows="5" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 resize-none" placeholder="문의 내용을 입력해주세요"></textarea>
    </div>
    <div class="flex items-center gap-2">
      <input id="f-public" type="checkbox" class="rounded" checked>
      <label for="f-public" class="text-sm text-gray-600">Q&A 게시판에 공개</label>
    </div>
    <button onclick="submitAsk()" class="w-full py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-700 active:scale-95 transition-all">제출하기</button>
  </div>

  <div id="ask-success" class="hidden bg-white rounded-xl shadow-sm p-12 text-center">
    <div class="text-4xl mb-4">✅</div>
    <h3 class="font-bold text-gray-900 text-lg mb-2">문의가 접수되었습니다</h3>
    <p class="text-gray-500 text-sm">확인 후 답변드리겠습니다.</p>
  </div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
let askCategories = [];
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('ask-title').textContent = c.askTitle;
  document.getElementById('ask-desc').textContent = c.askDesc;
  askCategories = c.askCategories || [];
  const sel = document.getElementById('f-category');
  sel.innerHTML = askCategories.map(cat=>`<option value="${cat}">${cat}</option>`).join('');
});

async function submitAsk() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const category = document.getElementById('f-category').value;
  const message = document.getElementById('f-message').value.trim();
  const contact = document.getElementById('f-contact').value.trim();
  const isPublic = document.getElementById('f-public').checked;

  if(!name || !email || !message) { alert('이름, 이메일, 문의 내용은 필수입니다.'); return; }

  const inquiries = await Store.getInquiries();
  const newInquiry = {
    id: Date.now().toString(), name, email, contact, category, message,
    status: 'pending', createdAt: new Date().toISOString().slice(0,10), isPublic,
  };
  await Store.saveInquiries([...inquiries, newInquiry]);
  document.getElementById('ask-form-wrap').classList.add('hidden');
  document.getElementById('ask-success').classList.remove('hidden');
}
</script>
</body>
</html>
