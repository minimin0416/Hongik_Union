<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Q&A 게시판')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">Q&amp;A 게시판</h1>
  <div class="space-y-4" id="qna-list"></div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const inquiries = await Store.getInquiries();
  const publicOnes = inquiries.filter(i=>i.isPublic);
  const el = document.getElementById('qna-list');
  el.innerHTML = publicOnes.length ? publicOnes.map((q,i)=>`
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <button onclick="toggleQna(${i})" class="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-gray-50 transition-colors">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${q.category}</span>
            <span class="text-xs text-gray-400">${q.name.slice(0,1)}*${q.name.slice(-1)} · ${q.createdAt}</span>
          </div>
          <p class="font-medium text-gray-900 truncate">Q. ${q.message.slice(0,60)}${q.message.length>60?'...':''}</p>
        </div>
        <div class="flex items-center gap-2 ml-4 flex-shrink-0">
          ${q.status==='confirmed'?'<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">답변완료</span>':'<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">답변대기</span>'}
          <svg id="qna-icon-${i}" class="w-4 h-4 text-gray-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </button>
      <div id="qna-body-${i}" class="hidden border-t border-gray-100 px-6 py-4 space-y-3">
        <p class="text-gray-700 text-sm whitespace-pre-line">${q.message}</p>
        ${q.answer?`<div class="bg-blue-50 rounded-lg p-4"><p class="text-xs font-semibold text-blue-700 mb-1">관리자 답변</p><p class="text-sm text-gray-700 whitespace-pre-line">${q.answer}</p></div>`:''}
      </div>
    </div>`).join('') : '<div class="bg-white rounded-xl shadow-sm p-12 text-center text-gray-400">등록된 질문이 없습니다</div>';
});

function toggleQna(i) {
  const body = document.getElementById(`qna-body-${i}`);
  const icon = document.getElementById(`qna-icon-${i}`);
  body.classList.toggle('hidden');
  icon.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
}
</script>
</body>
</html>
