<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Q&A 게시판')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: contact('')}"></div>
<div class="page-content">
  <div class="max-w-3xl">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Q&amp;A 게시판</h2>
    <p class="text-gray-500 text-sm mb-6">답변이 완료된 문의 내용을 공개합니다.</p>
    <div id="qna-list" class="space-y-3"></div>
  </div>
</div>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const all = await Store.getInquiries();
  const list = all.filter(i => i.isPublic && i.status === 'confirmed');
  const el = document.getElementById('qna-list');
  if (!list.length) { el.innerHTML = '<p class="text-center text-gray-400 py-12 text-sm">등록된 Q&A가 없습니다.</p>'; return; }
  el.innerHTML = list.map((inq,i) => `
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <button class="qna-toggle w-full flex items-start justify-between px-5 py-4 text-left hover:bg-gray-50 transition-colors" data-i="${i}">
        <div class="flex items-start gap-3">
          <span class="w-6 h-6 rounded-full bg-gray-800 text-white text-xs flex items-center justify-center flex-shrink-0 font-bold mt-0.5">Q</span>
          <div>
            <p class="font-medium text-gray-800 text-sm">${inq.message}</p>
            <p class="text-xs text-gray-400 mt-1">${inq.category||''} · ${inq.createdAt||''}</p>
          </div>
        </div>
        <svg id="qna-icon-${i}" class="w-5 h-5 text-gray-400 flex-shrink-0 ml-2 mt-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="qna-body-${i}" class="hidden px-5 pb-4 flex gap-3 border-t border-gray-100 pt-3">
        <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs flex items-center justify-center flex-shrink-0 font-bold mt-0.5">A</span>
        <p class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">${inq.answer||''}</p>
      </div>
    </div>`).join('');

  document.querySelectorAll('.qna-toggle').forEach(btn => btn.addEventListener('click', () => {
    const i = btn.dataset.i;
    const body = document.getElementById(`qna-body-${i}`);
    const icon = document.getElementById(`qna-icon-${i}`);
    body.classList.toggle('hidden');
    icon.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
  }));
});
</script>
</body>
</html>
