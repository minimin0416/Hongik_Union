<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('가동아리 소개')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: clubs('provisional')}"></div>
<div class="page-content">
  <div id="club-detail" class="max-w-3xl mx-auto"></div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:inline="javascript">
/*<![CDATA[*/
const club = /*[[${club}]]*/ null;
/*]]>*/

function renderClub(club) {
  const infoRows = [
    { label:'회장', value:club.president },
    { label:'동아리방', value:club.room },
    { label:'모집 기간', value:club.recruitPeriod },
    { label:'정기모임', value:club.meetingSchedule },
  ].filter(r => r.value);

  document.getElementById('club-detail').innerHTML = `
    <a href="/clubs/provisional" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-800 mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      가동아리 목록으로
    </a>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
      <div class="px-6 pt-6 pb-4 border-b border-gray-100">
        <span class="text-xs bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full font-medium">${club.category}</span>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">${club.name}</h1>
        ${club.desc ? `<p class="text-gray-500 text-sm mt-1">${club.desc}</p>` : ''}
      </div>
      <div class="divide-y divide-gray-100">
        ${infoRows.map(r => `
          <div class="flex items-center px-6 py-3.5">
            <span class="w-24 text-sm text-gray-500 font-medium flex-shrink-0">${r.label}</span>
            <span class="text-sm text-gray-800">${r.value}</span>
          </div>`).join('')}
        ${club.website ? `
          <div class="flex items-center px-6 py-3.5">
            <span class="w-24 text-sm text-gray-500 font-medium flex-shrink-0">홈페이지</span>
            <a href="${club.website}" target="_blank" rel="noopener noreferrer" class="text-sm text-blue-600 hover:underline truncate">${club.website}</a>
          </div>` : ''}
      </div>
    </div>
    ${club.imageUrl
      ? `<img src="${club.imageUrl}" alt="${club.name} 소개" class="w-full rounded-xl object-cover mb-6" style="max-height:280px">`
      : `<div class="bg-gray-200 rounded-xl flex items-center justify-center mb-6 text-gray-400" style="height:200px">
          <div class="text-center">
            <svg class="w-10 h-10 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <p class="text-sm">소개 이미지 없음</p>
            <p class="text-xs mt-0.5">관리자 페이지에서 업로드</p>
          </div>
        </div>`}
    ${club.intro ? `
      <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><span class="w-1 h-5 bg-gray-800 rounded-full inline-block"></span>우리 동아리를 소개할게요</h2>
        <p class="text-gray-600 leading-relaxed text-sm">${club.intro}</p>
      </div>` : ''}
    ${(club.activities||[]).filter(Boolean).length ? `
      <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><span class="w-1 h-5 bg-gray-800 rounded-full inline-block"></span>활동 내용</h2>
        <ul class="space-y-2">
          ${club.activities.filter(Boolean).map((a,i) => `<li class="flex items-start gap-2 text-sm text-gray-600"><span class="w-5 h-5 rounded-full bg-gray-100 text-gray-500 text-xs flex items-center justify-center flex-shrink-0 mt-0.5 font-medium">${i+1}</span>${a}</li>`).join('')}
        </ul>
      </div>` : ''}
    ${(club.targets||[]).filter(Boolean).length ? `
      <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><span class="w-1 h-5 bg-gray-800 rounded-full inline-block"></span>이런 분을 환영해요</h2>
        <ul class="space-y-2">
          ${club.targets.filter(Boolean).map(t => `<li class="flex items-start gap-2 text-sm text-gray-600"><span class="text-green-500 flex-shrink-0 mt-0.5">✓</span>${t}</li>`).join('')}
        </ul>
      </div>` : ''}
    ${club.website ? `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-5 mb-6 flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-gray-700">더 궁금한 점이 있으신가요?</p>
          <p class="text-xs text-gray-500 mt-0.5">홈페이지에서 자세한 정보를 확인하세요</p>
        </div>
        <a href="${club.website}" target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-gray-800 text-white text-sm rounded-lg font-medium hover:bg-gray-700 transition-colors">홈페이지 바로가기</a>
      </div>` : ''}
  `;
}

function renderNotFound() {
  document.getElementById('club-detail').innerHTML = `
    <div class="text-center py-20 text-gray-400">
      <p class="text-lg mb-2">동아리를 찾을 수 없습니다</p>
      <a href="/clubs/provisional" class="text-sm text-blue-500 hover:underline">목록으로 돌아가기</a>
    </div>`;
}

if (club) renderClub(club); else renderNotFound();
</script>
</body>
</html>
