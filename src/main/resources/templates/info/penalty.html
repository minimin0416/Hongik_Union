<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('벌점 현황')}"></head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-black text-gray-900 mb-6">벌점 현황</h1>
  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">동아리</th>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">사유</th>
          <th class="text-right px-5 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">벌점</th>
          <th class="text-left px-5 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">날짜</th>
        </tr>
      </thead>
      <tbody id="penalty-body"></tbody>
    </table>
  </div>
</main>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const penalties = await Store.getPenalties();
  const tb = document.getElementById('penalty-body');
  tb.innerHTML = penalties.length ? penalties.map((p,i)=>`
    <tr class="${i%2===0?'':'bg-gray-50'} hover:bg-gray-100 transition-colors">
      <td class="px-5 py-3 text-sm font-medium text-gray-800">${p.club}</td>
      <td class="px-5 py-3 text-sm text-gray-600">${p.reason}</td>
      <td class="px-5 py-3 text-sm text-right font-bold text-red-600">${p.points}점</td>
      <td class="px-5 py-3 text-sm text-gray-400">${p.date}</td>
    </tr>`).join('') : `<tr><td colspan="4" class="px-5 py-12 text-center text-gray-400">벌점 내역이 없습니다</td></tr>`;
});
</script>
</body>
</html>
