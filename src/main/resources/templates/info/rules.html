<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('규칙')}"></head>
<body class="min-h-screen" style="background:#e8e8e8">
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{fragments/subheader :: info('rules')}"></div>
<div class="page-content">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">규칙</h2>
  <div class="space-y-3" id="rules-list"></div>
</div>
<footer id="site-footer" class="bg-white border-t border-gray-200 mt-4"></footer>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Store.initNav();
  const c = await Store.getSiteContent();
  document.getElementById('rules-list').innerHTML = (c.infoRules||[]).map(r => `
    <div class="bg-white border border-gray-200 rounded-xl p-5 hover:border-blue-900 transition-colors">
      <h3 class="font-semibold text-gray-800 mb-0.5">${r.title}</h3>
      <p class="text-gray-500 text-sm">${r.desc}</p>
    </div>`).join('');
});
</script>
</body>
</html>
