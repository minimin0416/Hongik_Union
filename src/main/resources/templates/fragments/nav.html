<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="nav" class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex items-center h-16">
      <a href="/" class="flex-shrink-0 mr-8">
        <div th:if="${#strings.isEmpty(logo)}" class="flex flex-col leading-tight">
          <span class="font-black text-base text-gray-900 tracking-tight">홍익대학교</span>
          <span class="text-xs text-gray-400 tracking-widest uppercase font-medium">HONGIK UNIVERSITY</span>
        </div>
        <img th:if="${not #strings.isEmpty(logo)}" th:src="${logo}" alt="로고" style="height:40px;max-width:160px;object-fit:contain">
      </a>
      <nav class="hidden lg:flex items-center h-full flex-1">
        <div th:each="item : ${navItems}" class="relative group h-full flex items-center">
          <a th:href="${item.href}"
             th:text="${item.title}"
             th:classappend="${#strings.startsWith(currentPath, item.section)} ? 'text-gray-900 border-gray-900' : 'text-gray-600 border-transparent hover:text-gray-900 hover:border-gray-300'"
             class="px-3 xl:px-4 h-full flex items-center text-sm font-medium transition-colors whitespace-nowrap border-b-2">지원</a>
          <div class="absolute top-full left-0 hidden group-hover:block min-w-36 bg-white shadow-lg rounded-b-lg overflow-hidden z-50 border-t-2 border-gray-900">
            <a th:each="sub : ${item.submenu}" th:href="${sub.href}" th:text="${sub.title}"
               th:classappend="${currentPath == sub.href} ? 'bg-gray-100 text-gray-900 font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
               class="block px-4 py-2.5 text-sm transition-colors">메뉴</a>
          </div>
        </div>
      </nav>
      <div class="flex items-center gap-2 ml-auto">
        <a th:href="${#strings.isEmpty(content.instagramUrl)} ? '#' : content.instagramUrl"
           th:target="${#strings.isEmpty(content.instagramUrl)} ? null : '_blank'"
           class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors text-gray-600">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </a>
        <a th:href="${#strings.isEmpty(content.kakaoUrl)} ? '#' : content.kakaoUrl"
           th:target="${#strings.isEmpty(content.kakaoUrl)} ? null : '_blank'"
           class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#3A1D1D"><path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.9 1.87 5.45 4.68 6.96L5.5 21l3.9-2.04C10.23 19.31 11.1 19.5 12 19.5c5.52 0 10-3.69 10-8.25S17.52 3 12 3z"/></svg>
        </a>
        <button id="hamburger" class="lg:hidden p-2 text-gray-600 hover:text-gray-900 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div id="mobile-menu" class="lg:hidden hidden bg-white border-t border-gray-200 shadow-lg">
    <div th:each="item : ${navItems}">
      <button class="mobile-menu-toggle w-full flex items-center justify-between px-4 py-3.5 text-sm font-medium text-gray-700 hover:bg-gray-50 border-b border-gray-100">
        <span th:text="${item.title}">메뉴</span>
        <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="mobile-submenu hidden bg-gray-50">
        <a th:each="sub : ${item.submenu}" th:href="${sub.href}" th:text="${sub.title}" class="block px-8 py-3 text-sm text-gray-600 hover:text-gray-900 border-b border-gray-100">서브메뉴</a>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var hamburger = document.getElementById('hamburger');
      var mobileMenu = document.getElementById('mobile-menu');
      if (!hamburger || !mobileMenu) return;
      hamburger.addEventListener('click', function () { mobileMenu.classList.toggle('hidden'); });
      mobileMenu.querySelectorAll('.mobile-menu-toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var sub = btn.nextElementSibling;
          var svg = btn.querySelector('svg');
          sub.classList.toggle('hidden');
          svg.style.transform = sub.classList.contains('hidden') ? '' : 'rotate(180deg)';
        });
      });
    })();
  </script>
</header>
</body>
</html>
