# 서버 포트 (Render 등 호스팅이 PORT 환경변수를 주입하면 그 값을 사용)
server.port=${PORT:8080}

# Upstash Redis 연결 (환경변수로 주입)
# 형식: rediss://default:비밀번호@호스트.upstash.io:6379
UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:redis://localhost:6379}

# Thymeleaf 캐시 (로컬 개발은 false, 배포 환경에서는 THYMELEAF_CACHE=true로 오버라이드)
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
